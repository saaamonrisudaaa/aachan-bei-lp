name: Verify ranking hashtags
on:
  push:
    paths:
      - ranking-hashtag-check-trigger.txt
permissions:
  contents: write
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify live homepage
        run: |
          python - <<'PY'
          import json, time, urllib.request
          expected = ['#東京', '#東久留米', '#中華料理', '#錦糸町', '#ラーメン', '#神田', '#カフェ']
          result = {'status':'timeout'}
          for attempt in range(1,31):
              req=urllib.request.Request(f'https://achanbay.com/?ranking_hashtag_check={int(time.time())}',headers={'User-Agent':'Mozilla/5.0','Cache-Control':'no-cache'})
              try:
                  with urllib.request.urlopen(req,timeout=20) as response:
                      html=response.read().decode('utf-8','replace')
                  checks={tag:tag in html for tag in expected}
                  likes_unchanged='いいね 101' in html and 'いいね 1,630' in html
                  if all(checks.values()) and likes_unchanged:
                      result={'status':'success','attempt':attempt,'hashtags':checks,'likes_unchanged':likes_unchanged,'url':'https://achanbay.com/#ranking'}
                      break
              except Exception as exc:
                  result['last_error']=str(exc)
              time.sleep(10)
          with open('ranking-hashtag-live-check.json','w',encoding='utf-8') as f:
              json.dump(result,f,ensure_ascii=False,indent=2)
          PY
      - name: Publish result
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add ranking-hashtag-live-check.json
          git commit -m "Add temporary ranking hashtag verification" || exit 0
          git push
