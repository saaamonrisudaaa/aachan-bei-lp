name: Export all Tabelog visits

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/export-all-tabelog.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch and parse every visit-list page
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, re, time
          from html import unescape
          from urllib.request import Request, urlopen
          from urllib.parse import urljoin

          BASE = 'https://tabelog.com/rvwr/003533852/visited_restaurants/list/'
          UA = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/137 Safari/537.36'

          def fetch(url):
              req = Request(url, headers={'User-Agent': UA, 'Accept-Language': 'ja-JP,ja;q=0.9'})
              with urlopen(req, timeout=45) as response:
                  return response.read().decode('utf-8', errors='ignore')

          def clean(value):
              value = re.sub(r'<br\s*/?>', ' ', value, flags=re.I)
              value = re.sub(r'<[^>]+>', ' ', value)
              return ' '.join(unescape(value).split())

          records = []
          seen = set()
          pages = []
          for page in range(1, 8):
              url = BASE if page == 1 else BASE + f'?PG={page}'
              raw = fetch(url)
              pages.append({'page': page, 'bytes': len(raw)})
              starts = list(re.finditer(r'<li[^>]+class="[^"]*(?:js-rstlist-info|review-list__item)[^"]*"', raw, flags=re.I))
              if not starts:
                  starts = list(re.finditer(r'<div[^>]+class="[^"]*rvw-item[^"]*"', raw, flags=re.I))
              chunks = []
              if starts:
                  for index, start in enumerate(starts):
                      end = starts[index + 1].start() if index + 1 < len(starts) else len(raw)
                      chunks.append(raw[start.start():end])
              else:
                  anchors = list(re.finditer(r'<a[^>]+href="(https://tabelog\.com/(?:[^"/]+/)+\d+/?)"[^>]*>', raw, flags=re.I))
                  for index, anchor in enumerate(anchors):
                      left = max(0, anchor.start() - 2000)
                      right = anchors[index + 1].start() if index + 1 < len(anchors) else min(len(raw), anchor.start() + 12000)
                      chunks.append(raw[left:right])

              for chunk in chunks:
                  link_matches = re.findall(r'href="(https://tabelog\.com/(?!rvwr/)(?:[^"?#]+/)+\d+/?)"[^>]*>(.*?)</a>', chunk, flags=re.I|re.S)
                  selected = None
                  for href, label in link_matches:
                      name = clean(label)
                      if name and not any(x in name for x in ['口コミ', '写真', '地図', 'メニュー', '予約']):
                          selected = (href.split('?')[0], name)
                          break
                  if not selected:
                      continue
                  href, name = selected
                  if href in seen:
                      continue

                  visible = clean(chunk)
                  station_genre = ''
                  sg = re.search(re.escape(name) + r'\s+(.{2,160}?)\s+\d\.\d{1,2}\s+\d+\s*人', visible)
                  if sg:
                      station_genre = sg.group(1)
                  budget = ''
                  bm = re.search(r'(?:夜\s+[^定]{1,35})?(?:昼\s+[^定]{1,35})', visible)
                  if bm:
                      budget = bm.group(0)
                  visit = ''
                  vm = re.search(r'(20\d{2}/\d{2})訪問', visible)
                  if vm:
                      visit = vm.group(1)

                  review = ''
                  point = re.search(r'(?:夜|昼)の点数：\s*\d\.\d\s*(.*?)(?=20\d{2}/\d{2}訪問|\d+回\s|$)', visible)
                  if point:
                      review = point.group(1).strip()
                  if len(review) < 15:
                      candidates = re.findall(r'<p[^>]+class="[^"]*(?:rvw-item__rvw-comment|review-list__text|js-rvw-comment)[^"]*"[^>]*>(.*?)</p>', chunk, flags=re.I|re.S)
                      if candidates:
                          review = max((clean(x) for x in candidates), key=len, default='')
                  review = review[:1600]

                  area = station_genre
                  genre = ''
                  if ' / ' in station_genre:
                      area, genre = station_genre.split(' / ', 1)
                  records.append({
                      'name': name,
                      'url': href,
                      'area': area.strip(),
                      'genre': genre.strip(),
                      'budget': budget.strip(),
                      'visit': visit,
                      'review': review,
                      'source_page': page,
                  })
                  seen.add(href)
              time.sleep(1)

          report = {'count': len(records), 'pages': pages, 'restaurants': records}
          with open('tabelog-all.json', 'w', encoding='utf-8') as f:
              json.dump(report, f, ensure_ascii=False, indent=2)
          print(json.dumps({'count': len(records), 'pages': pages}, ensure_ascii=False))
          if len(records) < 81:
              raise SystemExit(f'Only parsed {len(records)} restaurants; expected at least 81')
          PY
      - name: Commit export
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tabelog-all.json
          git commit -m 'Export all visited restaurants from Tabelog'
          git push
