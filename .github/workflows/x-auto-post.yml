name: X post fallback and validation

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/x-auto-post.yml"
      - "scripts/x_auto_post.py"
      - "scripts/x_post_*.py"
      - "tests/test_x_posting.py"
  workflow_dispatch:
    inputs:
      slot:
        description: "Post time slot"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - morning
          - lunch
          - afternoon
          - evening
      dry_run:
        description: "Preview only (do not publish)"
        required: true
        default: true
        type: boolean
      prepared_payload_b64:
        description: "Optional base64 JSON prepared by the Chrome-first workflow"
        required: false
        type: string
      sync_history:
        description: "Backfill and persist the full 184-day X history without posting"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: x-auto-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      X_API_KEY: ${{ secrets.X_API_KEY }}
      X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
      SLOT: ${{ inputs.slot || 'auto' }}
      DRY_RUN: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
      PREPARED_PAYLOAD_B64: ${{ inputs.prepared_payload_b64 || '' }}
      SYNC_HISTORY: ${{ inputs.sync_history || false }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify post rules and queue
        run: |
          python -m unittest discover -s tests -v
          python scripts/x_post_queue.py validate

      - name: Build and publish post
        shell: bash
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [[ "$SYNC_HISTORY" == "true" ]]; then
            if [[ -n "$PREPARED_PAYLOAD_B64" ]]; then
              echo "sync_history cannot be combined with prepared_payload_b64" >&2
              exit 2
            fi
            python scripts/x_auto_post.py --sync-history
            exit 0
          fi
          if [[ -n "$PREPARED_PAYLOAD_B64" ]]; then
            if [[ "$DRY_RUN" == "true" ]]; then
              echo "prepared_payload_b64 requires dry_run=false" >&2
              exit 2
            fi
            printf '%s' "$PREPARED_PAYLOAD_B64" | base64 --decode > prepared-x-post.json
            python scripts/x_auto_post.py --publish-file prepared-x-post.json
            exit 0
          fi
          if [[ "$DRY_RUN" != "true" ]]; then
            echo "Live API posting requires prepared_payload_b64" >&2
            exit 2
          fi
          args=(--slot "$SLOT")
          args+=(--dry-run)
          python scripts/x_auto_post.py "${args[@]}"

      - name: Save successful post history
        if: ${{ env.SYNC_HISTORY == 'true' || env.DRY_RUN != 'true' }}
        shell: bash
        run: |
          git add data/x-post-history.json data/x-posted-log.json
          if git diff --cached --quiet; then
            echo "X post history is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Record X auto post history"
          git pull --rebase origin main
          git push
