name: Verify Instagram links

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/verify-instagram-links.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait for public page update
        shell: bash
        run: |
          set -euo pipefail
          status="pending"
          count=0
          direct_posts=false
          for attempt in $(seq 1 20); do
            html=$(curl -fsSL --max-time 30 "https://achanbay.com/shops.html?instagram_check=${GITHUB_RUN_ID}_${attempt}" || true)
            count=$(grep -o 'class="instagram-link"' <<<"$html" | wc -l | tr -d ' ')
            if grep -q 'DWIi4IpkhTC' <<<"$html" && grep -q 'DSfQDhMEr-1' <<<"$html" && grep -q 'DVF73szEgc7' <<<"$html"; then direct_posts=true; else direct_posts=false; fi
            if [[ "$count" == "20" && "$direct_posts" == true ]]; then
              status="success"
              break
            fi
            sleep 15
          done
          printf '{"status":"%s","instagram_links":%s,"direct_posts":%s,"checked_at":"%s"}\n' \
            "$status" "$count" "$direct_posts" "$(date -u +%FT%TZ)" > instagram-links-check.json
      - name: Save verification result
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add instagram-links-check.json
          git commit -m 'Record Instagram link verification'
          git push
