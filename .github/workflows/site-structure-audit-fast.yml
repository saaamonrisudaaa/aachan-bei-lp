name: Fast site structure audit
on:
  push:
    paths:
      - site-structure-audit-fast-trigger.txt
permissions:
  contents: write
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit site
        run: |
          python - <<'PY'
          import json, re, time, urllib.request
          from pathlib import Path
          from html import unescape

          base='https://achanbay.com/'
          endpoint_names=['','index.html','shops.html','privacy.html','pot-higashikurume.html','yayaya-kinshicho.html','sta-kanda.html','robots.txt','sitemap.xml','ads.txt','404.html']
          live={}
          for endpoint in endpoint_names:
              try:
                  req=urllib.request.Request(base+endpoint+'?audit='+str(time.time_ns()),headers={'User-Agent':'Mozilla/5.0','Cache-Control':'no-cache'})
                  with urllib.request.urlopen(req,timeout=20) as r:
                      body=r.read().decode('utf-8','replace')
                      live[endpoint or '/']={'status':r.status,'contentType':r.headers.get('Content-Type'),'bytes':len(body),'sample':body[:300] if endpoint.endswith(('.txt','.xml')) else ''}
              except Exception as exc:
                  live[endpoint or '/']={'error':str(exc)}
          pages=[]
          for p in sorted(Path('.').glob('*.html')):
              t=p.read_text(encoding='utf-8')
              clean=re.sub(r'<script\b.*?</script>|<style\b.*?</style>',' ',t,flags=re.I|re.S)
              clean=unescape(re.sub(r'\s+',' ',re.sub(r'<[^>]+>',' ',clean))).strip()
              get=lambda pat: (re.findall(pat,t,re.I|re.S) or [''])[0].strip()
              imgs=re.findall(r'<img\b[^>]*>',t,re.I|re.S)
              pages.append({'file':p.name,'bytes':len(t.encode()),'textChars':len(clean),'title':get(r'<title>(.*?)</title>'),'description':get(r'<meta\s+name=["\']description["\']\s+content=["\'](.*?)["\']'),'h1Count':len(re.findall(r'<h1\b',t,re.I)),'h2Count':len(re.findall(r'<h2\b',t,re.I)),'images':len(imgs),'imagesMissingAlt':sum(not re.search(r'\balt=["\']',x,re.I) for x in imgs),'canonical':bool(re.search(r'<link\s+rel=["\']canonical["\']',t,re.I)),'openGraph':bool(re.search(r'<meta\s+property=["\']og:',t,re.I)),'jsonLd':bool(re.search(r'application/ld\+json',t,re.I)),'adsense': 'ca-pub-2339565086393570' in t,'placeholderTerms':[x for x in ['公開前に','準備中','仮店舗','テンプレート','差し替えてください'] if x in clean],'internalHtmlLinks':len(re.findall(r'href=["\'](?:\./)?[^"\'#?]+\.html',t,re.I))})
          assets=[]
          for p in Path('assets').glob('*'):
              if p.is_file(): assets.append({'file':str(p),'bytes':p.stat().st_size})
          assets.sort(key=lambda x:x['bytes'],reverse=True)
          result={'checkedAt':time.strftime('%Y-%m-%dT%H:%M:%SZ',time.gmtime()),'live':live,'pages':pages,'largestAssets':assets[:20],'htmlPageCount':len(pages)}
          Path('site-structure-audit-fast-result.json').write_text(json.dumps(result,ensure_ascii=False,indent=2),encoding='utf-8')
          PY
      - name: Publish result
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add site-structure-audit-fast-result.json
          git commit -m "Add temporary fast site audit result" || exit 0
          git push
