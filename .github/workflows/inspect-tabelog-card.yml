name: Inspect Tabelog card

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/inspect-tabelog-card.yml

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip -q install beautifulsoup4
      - name: Inspect card fields
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from urllib.request import Request,urlopen
          from bs4 import BeautifulSoup
          url='https://tabelog.com/rvwr/003533852/visited_restaurants/list/'
          req=Request(url,headers={'User-Agent':'Mozilla/5.0 Chrome/137 Safari/537.36','Accept-Language':'ja-JP,ja;q=0.9'})
          soup=BeautifulSoup(urlopen(req,timeout=45).read(),'html.parser')
          cards=soup.select('.rvw-item--rvwlst')[:2]
          out=[]
          for card in cards:
              fields=[]
              for tag in card.find_all(True):
                  classes=tag.get('class') or []
                  if classes:
                      text=' '.join(tag.get_text(' ',strip=True).split())
                      if text and len(text)<2000:
                          fields.append({'tag':tag.name,'class':' '.join(classes),'text':text[:500]})
              out.append({'full_text':' '.join(card.get_text(' ',strip=True).split())[:5000],'fields':fields})
          open('tabelog-card-diagnostic.json','w',encoding='utf-8').write(json.dumps(out,ensure_ascii=False,indent=2))
          PY
      - name: Commit diagnostic
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tabelog-card-diagnostic.json
          git commit -m 'Inspect Tabelog visit card fields'
          git push
