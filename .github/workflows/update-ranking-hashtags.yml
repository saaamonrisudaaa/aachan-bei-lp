name: Update ranking hashtags
on:
  push:
    paths:
      - scripts/update_ranking_hashtags.py
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update ranking tags
        run: python scripts/update_ranking_hashtags.py
      - name: Commit ranking tags
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html
          git commit -m "Show ranking labels as hashtags" || exit 0
          git push
