name: Strip image metadata

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  strip-metadata:
    if: github.event_name != 'issues' || github.event.issue.title == '[automation] strip image metadata'
    runs-on: ubuntu-latest
    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Install image metadata tools
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick libimage-exiftool-perl

      - name: Remove metadata from published images
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' images < <(find . -type f \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' \) -not -path './.git/*' -print0)

          for image in "${images[@]}"; do
            mogrify -auto-orient "$image"
            exiftool -overwrite_original -all= "$image" >/dev/null
          done

          if exiftool -r -ext jpg -ext jpeg -ext png -gps:all -time:all -Make -Model . | grep -Eq 'GPS|Date/Time|Camera Model|Make'; then
            echo "Sensitive image metadata still remains."
            exit 1
          fi

      - name: Commit sanitized images
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/strip-image-metadata.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Remove metadata from published images"
          git push

      - name: Close automation issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --repo "${{ github.repository }}"
