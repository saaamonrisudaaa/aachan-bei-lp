name: Install AdSense code

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/install-adsense.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Add AdSense loader to HTML pages
        shell: bash
        run: |
          set -euo pipefail
          for file in ./*.html; do
            if grep -q 'ca-pub-2339565086393570' "$file"; then
              continue
            fi
            perl -0pi -e 's#</head>#  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2339565086393570" crossorigin="anonymous"></script>\n</head>#' "$file"
          done

      - name: Commit updated pages
        shell: bash
        run: |
          if git diff --quiet; then
            echo "AdSense code is already installed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ./*.html
          git commit -m "Add Google AdSense code to all pages"
          git push
