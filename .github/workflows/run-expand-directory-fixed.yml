name: Run corrected complete directory generator

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/run-expand-directory-fixed.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip -q install beautifulsoup4
      - name: Execute corrected generator
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import textwrap
          workflow=Path('.github/workflows/expand-directory-81.yml').read_text(encoding='utf-8')
          start=workflow.index("          python3 - <<'PY'\n")+len("          python3 - <<'PY'\n")
          end=workflow.index("\n          PY",start)
          code=textwrap.dedent(workflow[start:end])
          bad='''if old.get('local_href'):
    actions.append(f'<a class="local-link" href="{escape(old["local_href"],quote=True)}">{escape(old["local_text"] or "詳しい記事")}</a>')
actions.append(f'<a class="external-link" href="{escape(item["url"],quote=True)}" target="_blank" rel="noopener">食べログを見る</a>')'''
          good='''if old.get('local_href'):
    local_href=escape(old['local_href'],quote=True)
    local_text=escape(old['local_text'] or '詳しい記事')
    actions.append(f'<a class="local-link" href="{local_href}">{local_text}</a>')
tabelog_url=escape(item['url'],quote=True)
actions.append(f'<a class="external-link" href="{tabelog_url}" target="_blank" rel="noopener">食べログを見る</a>')'''
          if bad not in code:
              raise SystemExit('Invalid link block not found in generator')
          exec(compile(code.replace(bad,good,1),'directory-generator','exec'))
          PY
      - name: Validate and commit
        shell: bash
        run: |
          set -euo pipefail
          test "$(grep -o 'class="directory-card"' shops.html | wc -l | tr -d ' ')" = "81"
          test "$(grep -o 'class="instagram-link"' shops.html | wc -l | tr -d ' ')" = "81"
          grep -q 'id="load-more"' shops.html
          grep -q 'id="result-count">81' shops.html
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add shops.html
          git commit -m 'Expand restaurant directory to all 81 visits'
          git push
