name: Diagnose Tabelog pages

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/diagnose-tabelog-pages.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inspect links and surrounding markup
        shell: bash
        run: |
          set -euo pipefail
          pip -q install beautifulsoup4
          python3 - <<'PY'
          import json, re, time
          from urllib.request import Request, urlopen
          from bs4 import BeautifulSoup

          base='https://tabelog.com/rvwr/003533852/visited_restaurants/list/'
          ua='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/137 Safari/537.36'
          result=[]
          pattern=re.compile(r'^https://tabelog\.com/[^/]+/A\d+/A\d+/\d+/?(?:\?.*)?$')
          for page in range(1,6):
              url=base if page==1 else base+f'?PG={page}'
              req=Request(url,headers={'User-Agent':ua,'Accept-Language':'ja-JP,ja;q=0.9'})
              raw=urlopen(req,timeout=45).read().decode('utf-8','ignore')
              soup=BeautifulSoup(raw,'html.parser')
              rows=[]; seen=set()
              for a in soup.find_all('a',href=True):
                  href=a['href'].split('#')[0]
                  if href.startswith('/'):
                      href='https://tabelog.com'+href
                  if not pattern.match(href):
                      continue
                  href=href.split('?')[0]
                  name=' '.join(a.get_text(' ',strip=True).split())
                  if not name or href in seen:
                      continue
                  if name in {'詳細','口コミ','写真','地図','メニュー','予約'}:
                      continue
                  seen.add(href)
                  parent=a
                  ancestry=[]
                  for _ in range(7):
                      parent=parent.parent
                      if not parent: break
                      ancestry.append({'tag':parent.name,'class':parent.get('class',[])})
                  rows.append({'name':name,'url':href,'ancestry':ancestry})
              result.append({'page':page,'bytes':len(raw),'count':len(rows),'rows':rows})
              time.sleep(1)
          open('tabelog-diagnostic.json','w',encoding='utf-8').write(json.dumps(result,ensure_ascii=False,indent=2))
          print([(x['page'],x['count']) for x in result])
          PY
      - name: Commit diagnostic
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tabelog-diagnostic.json
          git commit -m 'Inspect all Tabelog visit pages'
          git push
