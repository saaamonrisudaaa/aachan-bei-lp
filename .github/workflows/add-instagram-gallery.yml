name: Add Instagram gallery
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add scrolling Instagram gallery
        run: |
          python - <<'PY'
          from pathlib import Path

          index = Path('index.html')
          text = index.read_text(encoding='utf-8')
          old = '<p>写真だけでは伝えきれない雰囲気、頼んでよかったメニュー、予算感、行く前に知りたいポイントをまとめます。</p>'
          group = '''<div class="instagram-group"><a class="instagram-tile" href="https://www.instagram.com/ah_bei_gourmet/?hl=ja" target="_blank" rel="noopener" aria-label="POT東久留米の投稿を見る"><img src="./assets/pot-ok.jpg" alt="POT東久留米の料理"><span>POT東久留米</span></a><a class="instagram-tile" href="https://www.instagram.com/p/DSfQDhMEr-1/?utm_source=ig_web_copy_link&amp;igsh=MzRlODBiNWFlZA==" target="_blank" rel="noopener" aria-label="家家家 錦糸町店の投稿を見る"><img src="./assets/yayaya-kinshicho.jpg" alt="家家家 錦糸町店のラーメン"><span>家家家 錦糸町店</span></a><a class="instagram-tile" href="https://www.instagram.com/p/DVF73szEgc7/?utm_source=ig_web_copy_link&amp;igsh=MzRlODBiNWFlZA==" target="_blank" rel="noopener" aria-label="Sta. 神田の投稿を見る"><img src="./assets/sta.kanda.jpeg" alt="Sta. 神田のチーズケーキとドリンク"><span>Sta. 神田</span></a></div>'''
          duplicate = '''<div class="instagram-group" aria-hidden="true"><a class="instagram-tile" href="https://www.instagram.com/ah_bei_gourmet/?hl=ja" target="_blank" rel="noopener" tabindex="-1"><img src="./assets/pot-ok.jpg" alt=""><span>POT東久留米</span></a><a class="instagram-tile" href="https://www.instagram.com/p/DSfQDhMEr-1/?utm_source=ig_web_copy_link&amp;igsh=MzRlODBiNWFlZA==" target="_blank" rel="noopener" tabindex="-1"><img src="./assets/yayaya-kinshicho.jpg" alt=""><span>家家家 錦糸町店</span></a><a class="instagram-tile" href="https://www.instagram.com/p/DVF73szEgc7/?utm_source=ig_web_copy_link&amp;igsh=MzRlODBiNWFlZA==" target="_blank" rel="noopener" tabindex="-1"><img src="./assets/sta.kanda.jpeg" alt=""><span>Sta. 神田</span></a></div>'''
          new = f'''<div class="instagram-showcase"><div class="instagram-showcase-head"><p>写真だけでは伝えきれない雰囲気や、おすすめメニューを投稿写真と一緒に紹介します。</p><a class="instagram-profile-link" href="https://www.instagram.com/ah_bei_gourmet/?hl=ja" target="_blank" rel="noopener">@ah_bei_gourmetを見る</a></div><div class="instagram-reel" role="region" aria-label="あーちゃんべいのInstagram投稿"><div class="instagram-track">{group}{duplicate}</div></div></div>'''
          if old not in text:
              raise SystemExit('Intro description was not found')
          index.write_text(text.replace(old, new, 1), encoding='utf-8')

          style = Path('style.css')
          styles = style.read_text(encoding='utf-8')
          css = r'''

/* Instagram post gallery */
.instagram-showcase {
  min-width: 0;
  padding: 16px;
  overflow: hidden;
  background: rgba(255, 255, 255, 0.82);
  border: 1px solid var(--line);
  border-radius: 18px;
  box-shadow: 0 12px 30px rgba(89, 54, 28, 0.1);
}

.instagram-showcase-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 14px;
}

.intro .instagram-showcase-head p {
  flex: 1;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.7;
}

.instagram-profile-link {
  flex: 0 0 auto;
  padding: 7px 12px;
  color: #9f3f62;
  background: #fff1f5;
  border: 1px solid #f3bfd0;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 800;
  text-decoration: none;
  white-space: nowrap;
}

.instagram-profile-link:hover {
  background: #ffe3ed;
}

.instagram-reel {
  overflow: hidden;
  border-radius: 14px;
  -webkit-mask-image: linear-gradient(90deg, transparent, #000 5%, #000 95%, transparent);
  mask-image: linear-gradient(90deg, transparent, #000 5%, #000 95%, transparent);
}

.instagram-track {
  display: flex;
  width: max-content;
  animation: instagram-scroll 24s linear infinite;
  will-change: transform;
}

.instagram-group {
  display: flex;
  flex: 0 0 auto;
  gap: 12px;
  padding-right: 12px;
}

.instagram-tile {
  position: relative;
  flex: 0 0 148px;
  width: 148px;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  background: #f4e5dc;
  border: 2px solid #fff;
  border-radius: 14px;
  box-shadow: 0 5px 15px rgba(56, 37, 29, 0.18);
  text-decoration: none;
  transform: translateZ(0);
}

.instagram-tile img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 280ms ease;
}

.instagram-tile span {
  position: absolute;
  right: 0;
  bottom: 0;
  left: 0;
  padding: 24px 9px 8px;
  color: #fff;
  background: linear-gradient(transparent, rgba(25, 14, 10, 0.82));
  font-size: 12px;
  font-weight: 800;
  line-height: 1.35;
}

.instagram-tile:hover img,
.instagram-tile:focus-visible img {
  transform: scale(1.06);
}

.instagram-tile:focus-visible {
  outline: 3px solid var(--rose);
  outline-offset: 2px;
}

.instagram-reel:hover .instagram-track,
.instagram-reel:focus-within .instagram-track {
  animation-play-state: paused;
}

@keyframes instagram-scroll {
  to { transform: translateX(-50%); }
}

@media (max-width: 860px) {
  .instagram-showcase {
    margin-top: 4px;
  }
}

@media (max-width: 560px) {
  .instagram-showcase {
    padding: 13px;
    border-radius: 14px;
  }

  .instagram-showcase-head {
    display: block;
  }

  .instagram-profile-link {
    display: inline-flex;
    margin-top: 10px;
  }

  .instagram-tile {
    flex-basis: 128px;
    width: 128px;
  }

  .instagram-track {
    animation-duration: 20s;
  }
}

@media (prefers-reduced-motion: reduce) {
  .instagram-reel {
    overflow-x: auto;
    -webkit-mask-image: none;
    mask-image: none;
  }

  .instagram-track {
    animation: none;
  }

  .instagram-group[aria-hidden="true"] {
    display: none;
  }
}
'''
          if '/* Instagram post gallery */' not in styles:
              style.write_text(styles + css, encoding='utf-8')
          PY
      - name: Remove temporary workflow
        run: rm .github/workflows/add-instagram-gallery.yml
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html style.css .github/workflows/add-instagram-gallery.yml
          git commit -m "Add scrolling Instagram gallery"
          git push