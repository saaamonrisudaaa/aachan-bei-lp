name: Fix shop filter visibility
on:
  push:
    paths:
      - scripts/fix_shop_filter_visibility.py
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix filtered card visibility
        run: python scripts/fix_shop_filter_visibility.py
      - name: Commit fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add shops.html
          git commit -m "Fix shop cards remaining visible after search" || exit 0
          git push
