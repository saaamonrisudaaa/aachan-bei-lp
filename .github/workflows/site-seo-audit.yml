name: Site SEO audit
on:
  push:
    paths:
      - site-seo-audit-trigger.txt
permissions:
  contents: write
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Lighthouse
        run: npm install --no-save lighthouse@12.8.2
      - name: Audit site files and live endpoints
        run: |
          python - <<'PY'
          import json, re, time, urllib.request
          from pathlib import Path
          from html import unescape

          base='https://achanbay.com/'
          endpoints=['','index.html','shops.html','privacy.html','pot-higashikurume.html','yayaya-kinshicho.html','sta-kanda.html','robots.txt','sitemap.xml','ads.txt']
          live={}
          for endpoint in endpoints:
              url=base+endpoint+('?' if '?' not in endpoint else '&')+'audit='+str(int(time.time()))
              try:
                  req=urllib.request.Request(url,headers={'User-Agent':'Mozilla/5.0 (compatible; SiteAudit/1.0)','Cache-Control':'no-cache'})
                  with urllib.request.urlopen(req,timeout=30) as response:
                      body=response.read().decode('utf-8','replace')
                      live[endpoint or '/']={'status':response.status,'content_type':response.headers.get('Content-Type'),'bytes':len(body),'body_sample':body[:500] if endpoint in ['robots.txt','sitemap.xml','ads.txt'] else ''}
              except Exception as exc:
                  live[endpoint or '/']={'error':str(exc)}

          pages=[]
          for path in sorted(Path('.').glob('*.html')):
              text=path.read_text(encoding='utf-8')
              visible=re.sub(r'<script\b.*?</script>|<style\b.*?</style>',' ',text,flags=re.I|re.S)
              visible=re.sub(r'<[^>]+>',' ',visible)
              visible=unescape(re.sub(r'\s+',' ',visible)).strip()
              title=re.findall(r'<title>(.*?)</title>',text,re.I|re.S)
              desc=re.findall(r'<meta\s+name=["\']description["\']\s+content=["\'](.*?)["\']',text,re.I|re.S)
              h1=re.findall(r'<h1\b[^>]*>(.*?)</h1>',text,re.I|re.S)
              imgs=re.findall(r'<img\b[^>]*>',text,re.I|re.S)
              missing_alt=[tag for tag in imgs if not re.search(r'\balt=["\']',tag,re.I)]
              empty_alt=[tag for tag in imgs if re.search(r'\balt=["\']\s*["\']',tag,re.I)]
              internal_links=re.findall(r'href=["\'](\.?\.?/[^"\'#?]+\.html|#[^"\']+)',text,re.I)
              placeholders=[word for word in ['公開前に','準備中','仮店舗','テンプレート','差し替えてください'] if word in visible]
              pages.append({
                  'file':path.name,'bytes':len(text.encode()),'title':title[0].strip() if title else '',
                  'description':desc[0].strip() if desc else '', 'h1_count':len(h1),
                  'word_chars':len(visible),'images':len(imgs),'missing_alt':len(missing_alt),'empty_alt':len(empty_alt),
                  'canonical':bool(re.search(r'<link\s+rel=["\']canonical["\']',text,re.I)),
                  'open_graph':bool(re.search(r'<meta\s+property=["\']og:',text,re.I)),
                  'json_ld':bool(re.search(r'application/ld\+json',text,re.I)),
                  'adsense': 'ca-pub-2339565086393570' in text,
                  'internal_html_links':len(internal_links),'placeholders':placeholders
              })
          Path('site-structure-audit.json').write_text(json.dumps({'live':live,'pages':pages},ensure_ascii=False,indent=2),encoding='utf-8')
          PY
      - name: Run mobile Lighthouse audits
        run: |
          npx lighthouse https://achanbay.com/ --output=json --output-path=lighthouse-home.json --chrome-flags='--headless --no-sandbox --disable-dev-shm-usage' --only-categories=performance,accessibility,best-practices,seo --quiet
          npx lighthouse https://achanbay.com/yayaya-kinshicho.html --output=json --output-path=lighthouse-detail.json --chrome-flags='--headless --no-sandbox --disable-dev-shm-usage' --only-categories=performance,accessibility,best-practices,seo --quiet
      - name: Summarize results
        run: |
          node <<'JS'
          const fs=require('fs');
          const structure=JSON.parse(fs.readFileSync('site-structure-audit.json','utf8'));
          const summarize=(file)=>{const x=JSON.parse(fs.readFileSync(file,'utf8'));return {finalUrl:x.finalUrl,scores:Object.fromEntries(Object.entries(x.categories).map(([k,v])=>[k,Math.round(v.score*100)])),metrics:{LCP:x.audits['largest-contentful-paint']?.displayValue,CLS:x.audits['cumulative-layout-shift']?.displayValue,TBT:x.audits['total-blocking-time']?.displayValue,FCP:x.audits['first-contentful-paint']?.displayValue},seoFailures:Object.values(x.audits).filter(a=>a.scoreDisplayMode==='binary'&&a.score===0&&a.details?.type!=='notApplicable').filter(a=>['seo','accessibility','best-practices'].some(cat=>x.categories[cat]?.auditRefs?.some(r=>r.id===a.id))).map(a=>({id:a.id,title:a.title,description:a.description}))};
          const result={checkedAt:new Date().toISOString(),structure, lighthouse:{home:summarize('lighthouse-home.json'),detail:summarize('lighthouse-detail.json')}};
          fs.writeFileSync('adsense-seo-audit-result.json',JSON.stringify(result,null,2));
          JS
      - name: Publish audit result
        if: always()
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add adsense-seo-audit-result.json site-structure-audit.json lighthouse-home.json lighthouse-detail.json
          git commit -m "Add temporary AdSense and SEO audit results" || exit 0
          git push
