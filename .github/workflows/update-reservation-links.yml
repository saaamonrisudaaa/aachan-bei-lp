name: Update reservation links
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update ranking reservation links
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          text = p.read_text(encoding='utf-8')
          old1 = '<a href="https://www.rentracks.jp/adx/r.html?idx=0.73616.381246.2886.5868&amp;dna=82489" rel="nofollow sponsored noopener" target="_blank">おすすめサービス</a>'
          new1 = '<a href="https://www.family-restaurant-pot.com/" target="_blank" rel="noopener">予約・詳細</a>'
          old2 = '<a href="#">地図を見る</a>'
          new2 = '<a href="https://www.instagram.com/p/DSfQDhMEr-1/?utm_source=ig_web_copy_link&amp;igsh=MzRlODBiNWFlZA==" target="_blank" rel="noopener">予約・詳細</a>'
          if old1 not in text:
              raise SystemExit('Rank 1 link was not found')
          if old2 not in text:
              raise SystemExit('Rank 2 link was not found')
          text = text.replace(old1, new1, 1).replace(old2, new2, 1)
          p.write_text(text, encoding='utf-8')
          PY
      - name: Remove temporary workflow
        run: rm .github/workflows/update-reservation-links.yml
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/update-reservation-links.yml
          git commit -m "Update ranking reservation links"
          git push