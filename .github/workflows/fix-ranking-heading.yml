name: Fix ranking heading
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Keep ranking title on one line
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          text = p.read_text(encoding='utf-8')
          old = '<h2>勝手にランキング</h2>'
          new = '<h2 class="ranking-heading">勝手にランキング</h2>'
          if old not in text:
              raise SystemExit('Ranking heading was not found')
          p.write_text(text.replace(old, new, 1), encoding='utf-8')

          css = Path('style.css')
          styles = css.read_text(encoding='utf-8')
          rule = '''\n.ranking-heading {\n  font-size: clamp(26px, 3.2vw, 38px);\n  white-space: nowrap;\n}\n'''
          if '.ranking-heading {' not in styles:
              css.write_text(styles + rule, encoding='utf-8')
          PY
      - name: Remove temporary workflow
        run: rm .github/workflows/fix-ranking-heading.yml
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html style.css .github/workflows/fix-ranking-heading.yml
          git commit -m "Keep ranking heading on one line"
          git push