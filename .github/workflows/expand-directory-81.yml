name: Expand directory to all 81 restaurants

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/expand-directory-81.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip -q install beautifulsoup4
      - name: Generate searchable cards for all restaurants
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          from bs4 import BeautifulSoup
          from html import escape
          import json, re

          page_path=Path('shops.html')
          text=page_path.read_text(encoding='utf-8')
          data=json.loads(Path('tabelog-all.json').read_text(encoding='utf-8'))['restaurants']
          if len(data)!=81:
              raise SystemExit(f'Expected 81 restaurants, found {len(data)}')

          soup=BeautifulSoup(text,'html.parser')
          existing={}
          for card in soup.select('.directory-card'):
              h=card.select_one('h2')
              if not h: continue
              name=h.get_text(' ',strip=True)
              summary=card.select_one('.review-summary')
              local=card.select_one('.local-link')
              instagram=card.select_one('.instagram-link')
              existing[name]={
                  'summary':summary.get_text(' ',strip=True) if summary else '',
                  'local_href':local.get('href') if local else '',
                  'local_text':local.get_text(' ',strip=True) if local else '',
                  'instagram_href':instagram.get('href') if instagram else '',
                  'instagram_text':instagram.get_text(' ',strip=True) if instagram else '',
              }

          profile='https://www.instagram.com/ah_bei_gourmet/?hl=ja'
          direct_instagram={
              'POT 東久留米店':'https://www.instagram.com/p/DWIi4IpkhTC/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA==',
              '家家家 錦糸町店':'https://www.instagram.com/p/DSfQDhMEr-1/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA==',
              'Sta. 神田':'https://www.instagram.com/p/DVF73szEgc7/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA==',
          }

          dishes=['ラーメン','つけ麺','チャーシュー','餃子','炒飯','チャーハン','酢豚','角煮','麻婆豆腐','中華そば','寿司','サーモン','刺身','海鮮','うなぎ','ひつまぶし','そば','うどん','天ぷら','唐揚げ','焼き鳥','おでん','とんかつ','カレー','スープカレー','ハンバーガー','タコス','ナチョス','パスタ','ピザ','ステーキ','焼肉','馬刺し','ビール','日本酒','コーヒー','ケーキ','チーズケーキ','パン','定食','杏仁豆腐','かき氷','ハンバーグ','オムライス','もつ鍋','しゃぶしゃぶ','串揚げ','蕎麦']

          def genre_values(genre):
              values=[]
              if any(x in genre for x in ['居酒屋','バー','バル','ビア']): values.append('izakaya')
              if any(x in genre for x in ['ラーメン','つけ麺','中華そば']): values.append('ramen')
              if any(x in genre for x in ['カフェ','喫茶','スイーツ','ケーキ','パン','かき氷']): values.append('cafe')
              if any(x in genre for x in ['中華','餃子','飲茶','台湾料理']): values.append('chinese')
              if any(x in genre for x in ['日本料理','寿司','海鮮','そば','蕎麦','うどん','うなぎ','焼き鳥','おでん','天ぷら','とんかつ','和食','郷土料理']): values.append('japanese')
              if not values: values.append('other')
              return ' '.join(dict.fromkeys(values))

          def area_values(item):
              url=item['url']; area=item['area']; values=[]
              if '/tokyo/' in url: values.append('tokyo')
              elif '/chiba/' in url: values.append('chiba')
              else: values.append('other')
              if '錦糸町' in area: values.append('kinshicho')
              if '小岩' in area: values.append('koiwa')
              if any(x in area for x in ['渋谷','恵比寿','代官山','神泉','代々木八幡','代々木公園','代々木上原']): values.append('shibuya-ebisu')
              if any(x in area for x in ['八王子','東久留米','吉祥寺','立川','町田','多摩']): values.append('tama')
              return ' '.join(dict.fromkeys(values))

          def compact_budget(value):
              value=value.replace('￥','').replace('夜 ','夜 ').replace('昼 ','昼 ')
              return value or '予算情報は食べログで確認'

          def generated_summary(item):
              review=item.get('review','')
              genre=item.get('genre','')
              found=[]
              for dish in dishes:
                  if dish in review or dish in genre:
                      normalized='そば' if dish=='蕎麦' else dish
                      if normalized not in found: found.append(normalized)
                  if len(found)>=3: break
              subject='、'.join(found) if found else (genre.split('、')[0] if genre else '料理')
              parts=[f'{subject}を楽しんだ訪問記録です。']
              positives=[]
              if any(x in review for x in ['美味','おいし','絶品','満足','クオリティ','完成度']): positives.append('料理の味や満足度が好印象')
              if any(x in review for x in ['店内','雰囲気','居心地','空間','綺麗','きれい']): positives.append('店内の雰囲気にも注目')
              if any(x in review for x in ['接客','店員','スタッフ','サービス']): positives.append('接客やサービスについても紹介')
              if positives: parts.append('口コミでは'+ '、'.join(positives[:2]) +'です。')
              cautions=[]
              if any(x in review for x in ['混雑','満席','並び','行列','待ち']): cautions.append('混雑する場合があるため時間に余裕を持つと安心')
              if '予約' in review: cautions.append('予約も検討がおすすめ')
              if '現金' in review: cautions.append('支払い方法は事前確認がおすすめ')
              if cautions: parts.append(cautions[0]+'です。')
              if len(parts)==1: parts.append('メニューや訪問時の印象は食べログの投稿で詳しく確認できます。')
              return ''.join(parts)

          def initial(name):
              c=name.strip()[0] if name.strip() else '店'
              return c.upper() if c.isascii() else c

          cards=[]
          for item in data:
              name=item['name']; old=existing.get(name,{})
              summary=old.get('summary') or generated_summary(item)
              tags=[x.strip() for x in item.get('genre','').split('、') if x.strip()][:3]
              if not tags: tags=['グルメ']
              tag_html=''.join(f'<span>{escape(x)}</span>' for x in tags)
              search=' '.join([name,item.get('area',''),item.get('genre',''),summary])
              actions=[]
              if old.get('local_href'):
                  actions.append(f'<a class="local-link" href="{escape(old["local_href"],quote=True)}">{escape(old["local_text"] or "詳しい記事")}</a>')
              actions.append(f'<a class="external-link" href="{escape(item["url"],quote=True)}" target="_blank" rel="noopener">食べログを見る</a>')
              insta=direct_instagram.get(name) or old.get('instagram_href') or profile
              insta_text='Instagram投稿を見る' if name in direct_instagram else 'Instagramを見る'
              actions.append(f'<a class="instagram-link" href="{escape(insta,quote=True)}" target="_blank" rel="noopener" aria-label="{escape(name,quote=True)}のInstagramを見る">{insta_text}</a>')
              cards.append(f'''        <article class="directory-card" data-area="{area_values(item)}" data-genre="{genre_values(item.get('genre',''))}" data-search="{escape(search,quote=True)}">
          <div class="directory-card-head"><span class="shop-initial">{escape(initial(name))}</span><div><h2>{escape(name)}</h2><p class="directory-meta">{escape(item.get('area',''))}｜{escape(compact_budget(item.get('budget','')))}</p></div></div><div class="directory-tags">{tag_html}</div><p class="review-summary">{escape(summary)}</p><div class="directory-actions">{''.join(actions)}</div>
        </article>''')

          start=text.index('      <div class="directory-grid" id="directory-grid">')
          end=text.index('\n\n      <div class="empty-state"',start)
          replacement='      <div class="directory-grid" id="directory-grid">\n'+'\n\n'.join(cards)+'\n      </div>'
          text=text[:start]+replacement+text[end:]
          text=re.sub(r'<span id="result-count">\d+</span>店を表示', '<span id="visible-count">20</span> / <span id="result-count">81</span>店を表示', text, count=1)
          text=text.replace('      <div class="empty-state" id="empty-state">', '      <button class="load-more" id="load-more" type="button">もっと見る</button>\n\n      <div class="empty-state" id="empty-state">',1)

          css_marker='    .empty-state{display:none;'
          css_rule='    .load-more{display:block;min-width:180px;margin:28px auto 0;padding:12px 24px;color:#38251d;background:#fff;border:2px solid #38251d;border-radius:999px;box-shadow:3px 4px 0 #38251d;font-weight:800;cursor:pointer}\n    .load-more[hidden]{display:none}\n'
          if '.load-more{display:block' not in text:
              text=text.replace(css_marker,css_rule+css_marker,1)

          script_start=text.index('  <script>\n    const cards=',text.index('</footer>'))
          script_end=text.index('  </script>',script_start)+len('  </script>')
          script='''  <script>
    const cards=[...document.querySelectorAll('.directory-card')];
    const search=document.getElementById('shop-search');
    const area=document.getElementById('area-filter');
    const genre=document.getElementById('genre-filter');
    const count=document.getElementById('result-count');
    const visibleCount=document.getElementById('visible-count');
    const empty=document.getElementById('empty-state');
    const loadMore=document.getElementById('load-more');
    const normalize=value=>value.toLowerCase().normalize('NFKC').replace(/\\s+/g,' ');
    let displayLimit=20;
    function applyFilters(resetLimit=false){
      if(resetLimit) displayLimit=20;
      const term=normalize(search.value.trim());
      const matches=cards.filter(card=>{
        const matchesTerm=!term||normalize(card.dataset.search+' '+card.textContent).includes(term);
        const matchesArea=area.value==='all'||card.dataset.area.split(' ').includes(area.value);
        const matchesGenre=genre.value==='all'||card.dataset.genre.split(' ').includes(genre.value);
        return matchesTerm&&matchesArea&&matchesGenre;
      });
      cards.forEach(card=>card.hidden=true);
      matches.slice(0,displayLimit).forEach(card=>card.hidden=false);
      const shown=Math.min(displayLimit,matches.length);
      count.textContent=matches.length;
      visibleCount.textContent=shown;
      empty.classList.toggle('show',matches.length===0);
      loadMore.hidden=shown>=matches.length;
    }
    const params=new URLSearchParams(location.search);
    if([...area.options].some(option=>option.value===params.get('area'))) area.value=params.get('area');
    if([...genre.options].some(option=>option.value===params.get('genre'))) genre.value=params.get('genre');
    if(params.get('q')) search.value=params.get('q');
    search.addEventListener('input',()=>applyFilters(true));
    area.addEventListener('change',()=>applyFilters(true));
    genre.addEventListener('change',()=>applyFilters(true));
    loadMore.addEventListener('click',()=>{displayLimit+=20;applyFilters()});
    document.getElementById('reset-filter').addEventListener('click',()=>{search.value='';area.value='all';genre.value='all';history.replaceState(null,'',location.pathname);applyFilters(true);search.focus()});
    applyFilters();
  </script>'''
          text=text[:script_start]+script+text[script_end:]
          page_path.write_text(text,encoding='utf-8')
          PY
      - name: Validate generated page
        shell: bash
        run: |
          test "$(grep -o 'class="directory-card"' shops.html | wc -l | tr -d ' ')" = "81"
          test "$(grep -o 'class="instagram-link"' shops.html | wc -l | tr -d ' ')" = "81"
          grep -q 'id="load-more"' shops.html
          grep -q 'id="result-count">81' shops.html
      - name: Commit complete directory
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add shops.html
          git commit -m 'Expand restaurant directory to all 81 visits'
          git push
