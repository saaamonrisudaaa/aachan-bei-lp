name: Verify Pages deployment

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/verify-pages-deploy.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait for the new directory to be public
        shell: bash
        run: |
          set -euo pipefail
          status="pending"
          root_new=false
          directory_new=false
          for attempt in $(seq 1 20); do
            root=$(curl -fsSL --max-time 30 "https://achanbay.com/?deploy_check=${GITHUB_RUN_ID}_${attempt}" || true)
            directory=$(curl -fsSL --max-time 30 "https://achanbay.com/shops.html?deploy_check=${GITHUB_RUN_ID}_${attempt}" || true)
            if grep -q 'shops.html?area=kinshicho' <<<"$root"; then root_new=true; else root_new=false; fi
            if grep -q '行ったお店から探す' <<<"$directory"; then directory_new=true; else directory_new=false; fi
            if [[ "$root_new" == true && "$directory_new" == true ]]; then
              status="success"
              break
            fi
            sleep 15
          done
          printf '{"status":"%s","root_new":%s,"directory_new":%s,"checked_at":"%s"}\n' \
            "$status" "$root_new" "$directory_new" "$(date -u +%FT%TZ)" > pages-deploy-check.json
      - name: Save verification result
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pages-deploy-check.json
          git commit -m 'Record Pages deployment verification'
          git push
