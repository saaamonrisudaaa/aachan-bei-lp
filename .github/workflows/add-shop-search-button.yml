name: Add shop search button
on:
  push:
    paths:
      - scripts/add_shop_search_button.py
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update shop finder
        run: python scripts/add_shop_search_button.py
      - name: Commit shop finder update
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add shops.html
          git commit -m "Add explicit shop search button" || exit 0
          git push
