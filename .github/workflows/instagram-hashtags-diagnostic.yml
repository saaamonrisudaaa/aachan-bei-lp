name: Inspect Instagram hashtags
on:
  push:
    paths:
      - .github/workflows/instagram-hashtags-diagnostic.yml
permissions:
  contents: write
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read public Instagram metadata
        run: |
          python - <<'PY'
          import json, re, urllib.request, html

          shortcodes = ['DVF73szEgc7', 'DSfQDhMEr-1', 'DWIi4IpkhTC']
          targets = ['https://www.instagram.com/ah_bei_gourmet/?hl=ja']
          for code in shortcodes:
            targets.extend([
              f'https://www.instagram.com/p/{code}/embed/captioned/',
              f'https://www.instagram.com/p/{code}/embed/',
              f'https://www.instagram.com/p/{code}/'
            ])
          results = []
          all_tags = []
          tag_pattern = re.compile(r'#[A-Za-z0-9_\u3040-\u30ff\u3400-\u9fffー・]+')
          meta_pattern = re.compile(r'<meta[^>]+(?:property|name)=["\'](?:og:description|description|twitter:description)["\'][^>]+content=["\'](.*?)["\']', re.I | re.S)
          for url in targets:
            req = urllib.request.Request(url, headers={
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/137 Safari/537.36',
              'Accept-Language': 'ja,en-US;q=0.8,en;q=0.6'
            })
            try:
              with urllib.request.urlopen(req, timeout=25) as response:
                text = response.read().decode('utf-8', 'replace')
                decoded = html.unescape(text).replace('\\u0023', '#').replace('\\n', '\n').replace('\\"', '"')
                tags = []
                for tag in tag_pattern.findall(decoded):
                  if re.fullmatch(r'#[0-9A-Fa-f]{3,8}', tag):
                    continue
                  if tag not in tags:
                    tags.append(tag)
                all_tags.extend(tags)
                descriptions = [html.unescape(value)[:2000] for value in meta_pattern.findall(text)]
                caption_samples = []
                for match in re.findall(r'"(?:caption|text)"\s*:\s*"(.{1,2000}?)"', decoded, re.S):
                  if '#' in match and match not in caption_samples:
                    caption_samples.append(match)
                results.append({'url': url, 'status': response.status, 'length': len(text), 'hashtags': tags[:100], 'descriptions': descriptions[:5], 'caption_samples': caption_samples[:5]})
            except Exception as exc:
              results.append({'url': url, 'error': str(exc)})
          unique = []
          for tag in all_tags:
            if tag not in unique:
              unique.append(tag)
          with open('instagram-hashtags-diagnostic.json', 'w', encoding='utf-8') as f:
            json.dump({'hashtags': unique, 'results': results}, f, ensure_ascii=False, indent=2)
          PY
      - name: Publish diagnostic
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add instagram-hashtags-diagnostic.json
          git commit -m "Update temporary Instagram hashtag diagnostic" || exit 0
          git push
