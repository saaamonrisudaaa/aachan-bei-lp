name: Inspect Instagram hashtags
on:
  push:
    paths:
      - .github/workflows/instagram-hashtags-diagnostic.yml
permissions:
  contents: write
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read public Instagram metadata
        run: |
          python - <<'PY'
          import json, re, urllib.request, html

          targets = [
            'https://www.instagram.com/api/v1/users/web_profile_info/?username=ah_bei_gourmet',
            'https://www.instagram.com/ah_bei_gourmet/?hl=ja',
            'https://www.instagram.com/p/DVF73szEgc7/',
            'https://www.instagram.com/p/DSfQDhMEr-1/',
            'https://www.instagram.com/p/DWIi4IpkhTC/'
          ]
          results = []
          all_tags = []
          pattern = re.compile(r'#[^\s#<>"\\]+')
          for url in targets:
            req = urllib.request.Request(url, headers={
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/137 Safari/537.36',
              'Accept-Language': 'ja,en-US;q=0.8,en;q=0.6',
              'X-IG-App-ID': '936619743392459'
            })
            try:
              with urllib.request.urlopen(req, timeout=25) as response:
                text = response.read().decode('utf-8', 'replace')
                decoded = html.unescape(text).replace('\\u0023', '#').replace('\\n', '\n')
                tags = pattern.findall(decoded)
                clean = []
                for tag in tags:
                  tag = tag.rstrip('.,、。!！?？)]}」』\\')
                  if 2 <= len(tag) <= 50 and tag not in clean:
                    clean.append(tag)
                all_tags.extend(clean)
                results.append({'url': url, 'status': response.status, 'length': len(text), 'hashtags': clean[:100]})
            except Exception as exc:
              results.append({'url': url, 'error': str(exc)})
          unique = []
          for tag in all_tags:
            if tag not in unique:
              unique.append(tag)
          with open('instagram-hashtags-diagnostic.json', 'w', encoding='utf-8') as f:
            json.dump({'hashtags': unique, 'results': results}, f, ensure_ascii=False, indent=2)
          PY
      - name: Publish diagnostic
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add instagram-hashtags-diagnostic.json
          git commit -m "Add temporary Instagram hashtag diagnostic" || exit 0
          git push
