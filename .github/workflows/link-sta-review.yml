name: Link Sta review
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update Sta link
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text()
          marker = '<h3>Sta.</h3>'
          pos = s.index(marker)
          link = '<a href="./shop-template.html">詳しく見る</a>'
          link_pos = s.index(link, pos)
          s = s[:link_pos] + '<a href="./sta-kanda.html">詳しく見る</a>' + s[link_pos + len(link):]
          p.write_text(s)
          PY
          rm .github/workflows/link-sta-review.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html .github/workflows/link-sta-review.yml
          git commit -m "Link Sta review page"
          git push
