name: Update Sta card
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update third card
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text()
          s = s.replace('<h3>仮店舗：表参道のごほうびカフェ</h3>', '<h3>Sta.</h3>', 1)
          s = s.replace('スイーツ、内装、ゆっくり過ごせる席感を中心に紹介。保存したくなる記事にします。', '万世橋駅跡の煉瓦造りの高架下を活かした、神田のレストラン・カフェ・バー。調理師や管理栄養士、フードスタイリストが日本の家庭料理にひと工夫を加え、調味料から丁寧に手づくりしています。', 1)
          s = s.replace('<a href="#">予約・詳細</a>', '<a href="https://www.instagram.com/p/DVF73szEgc7/?utm_source=ig_web_copy_link&amp;igsh=MzRlODBiNWFlZA==" target="_blank" rel="noopener">予約・詳細</a>', 1)
          p.write_text(s)
          PY
          rm .github/workflows/update-sta-card.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html .github/workflows/update-sta-card.yml
          git commit -m "Update Sta third-place card"
          git push
